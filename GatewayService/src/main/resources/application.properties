spring.application.name=GatewayService
server.port=9090

#Active la redirection automatique des microservice sur Eureka
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
#Convertit les noms des services en full minuscule
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true


##EUREKA##
#Très important, car cela viendra remplacer l'adresseIP dans l'URL avec le LoadBalancer
#Permet d'activer/désactiver les logs d'échec de recherche du EurekaServeur
logging.level.com.netflix.discovery=OFF
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#Chaque microservice envera l'ip local de la machine qui l'hberge à Eureka
eureka.instance.hostname=localhost

#############
#Actuator
#############
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
# Active le endpoint logfile
management.endpoint.logfile.access=read_only
#Activer l'arrêt à distance
management.endpoint.shutdown.access=unrestricted
#Les 100 dernières requêtes recues
management.endpoint.httpexchanges.access=read_only
# Indique le fichier de log à exposer
logging.file.name=logs/app.log

##########
# Spring Boot Admin
#############
## Lien du serveur SpringBootAdmin
spring.boot.admin.client.url=http://localhost:8083/
##Envoi de l'adresse ip de la machine client au serveur
spring.boot.admin.client.instance.service-host-type=IP
